name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: chrc
      - uses: actions/checkout@v4
        with:
          repository: hazyhaar/pkg
          path: hazyhaar_pkg
      - uses: actions/checkout@v4
        with:
          repository: hazyhaar/usertenant
          path: usertenant
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: chrc/go.sum
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
      - name: Lint
        working-directory: chrc
        run: golangci-lint run --timeout=5m

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: chrc
      - uses: actions/checkout@v4
        with:
          repository: hazyhaar/pkg
          path: hazyhaar_pkg
      - uses: actions/checkout@v4
        with:
          repository: hazyhaar/usertenant
          path: usertenant
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: chrc/go.sum
      - name: Download dependencies
        working-directory: chrc
        run: go mod download
      - name: Build
        working-directory: chrc
        run: CGO_ENABLED=0 go build ./...
      - name: Test
        working-directory: chrc
        run: go test -race -count=1 -timeout 120s ./...

  ci-ok:
    name: CI OK
    needs: [lint, test]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - run: |
          if [[ "${{ needs.lint.result }}" != "success" ]] || [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "CI failed: lint=${{ needs.lint.result }} test=${{ needs.test.result }}"
            exit 1
          fi
